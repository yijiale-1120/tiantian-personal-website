name: Deploy to GitHub Pages

on:
  # 推送到 main 分支时自动部署
  push:
    branches: [main]
  # 允许手动在 Actions 页面触发部署
  workflow_dispatch:

# 设置必要的权限
permissions:
  contents: read
  pages: write
  id-token: write

# 防止多个部署并发运行
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest

    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 安装 pnpm (版本 10.33.0)
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: 设置 Node.js 24.14.4
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "pnpm" # 自动缓存 pnpm，提升下次构建速度

      - name: 安装项目依赖
        run: pnpm install --frozen-lockfile

      - name: 构建项目
        run: pnpm run build

      - name: 设置 GitHub Pages
        uses: actions/configure-pages@v5

      - name: 上传构建产物
        uses: actions/upload-pages-artifact@v4
        with:
          path: "./dist" # Vite 默认的构建输出目录

      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
