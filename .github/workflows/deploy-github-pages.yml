# 仅手动触发：部署静态资源到 GitHub Pages（与宝塔部署可同时保留）
# 若站点已完全托管在宝塔，可忽略本工作流。

name: Deploy to GitHub Pages (manual)

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest

    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 安装 pnpm (版本 10.33.0)
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: 设置 Node.js 24.14.4
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "pnpm"

      - name: 安装项目依赖
        run: pnpm install --frozen-lockfile

      - name: 构建项目
        run: pnpm run build

      - name: 设置 GitHub Pages
        uses: actions/configure-pages@v5

      - name: 上传构建产物
        uses: actions/upload-pages-artifact@v4
        with:
          path: "./dist"

      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
